name: sleepyweareg

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env.production
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sleepy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sleepyweare}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - sleepy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        - DATABASE_URL=postgresql://placeholder:placeholder@placeholder:5432/placeholder?schema=public
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - uploads-data:/app/uploads
    networks:
      - sleepy-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://sleepyweareg.com/api
        - API_INTERNAL_URL=http://api:4000/api
    restart: unless-stopped
    env_file: .env.production
    environment:
      - API_INTERNAL_URL=http://api:4000/api
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3001:3000"
    networks:
      - sleepy-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres-data:
  uploads-data:

networks:
  sleepy-network:
    driver: bridge
