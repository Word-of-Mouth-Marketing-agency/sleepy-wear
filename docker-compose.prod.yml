name: sleepyweareg

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sleepy-network

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - sleepy-network

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        - DATABASE_URL=postgresql://placeholder:placeholder@placeholder:5432/placeholder?schema=public
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"
    volumes:
      - uploads-data:/app/uploads
    networks:
      - sleepy-network

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://sleepyweareg.com/api
        - API_INTERNAL_URL=http://api:4000/api
    restart: unless-stopped
    env_file: .env.production
    environment:
      - API_INTERNAL_URL=http://api:4000/api
    depends_on:
      - api
    ports:
      - "3001:3000"
    networks:
      - sleepy-network

volumes:
  postgres-data:
  uploads-data:

networks:
  sleepy-network:
    driver: bridge
