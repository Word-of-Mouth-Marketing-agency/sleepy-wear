services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sleepywear}
      POSTGRES_USER: ${POSTGRES_USER:-sleepywear}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sleepywear}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        DATABASE_URL: postgresql://sleepywear:sleepywear@postgres:5432/sleepywear?schema=public
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sleepywear:sleepywear@postgres:5432/sleepywear?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"
    volumes:
      - uploads-data:/app/uploads

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        API_INTERNAL_URL: http://api:4000/api
    restart: unless-stopped
    env_file: .env
    environment:
      API_INTERNAL_URL: http://api:4000/api
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  uploads-data:
